<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stránka nenalezena - PixelBeast</title>
    
    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Shoelace for wa-icon as requested -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/themes/light.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/components/icon/icon.js"></script>
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #06213c;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            flex-direction: column;
        }
        wa-icon {
            font-size: 6rem;
            color: #00e7a1;
            margin-bottom: 2rem;
        }
        h1 { 
            font-size: clamp(2.5rem, 5vw, 4rem); 
            margin-bottom: 1rem; 
            font-family: 'Poppins', sans-serif; 
        }
        p { 
            font-size: 1.2rem; 
            color: #cbd5e1; 
            margin-bottom: 2.5rem; 
            max-width: 500px; 
            padding: 0 1rem;
        }
        .btn {
            background-color: #00e7a1;
            color: #06213c;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.3s, transform 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        .btn:hover { 
            background-color: #00c78a; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <wa-icon name="face-frown" variant="regular"></wa-icon>
    <h1>Tady nic není</h1>
    <p>Omlouváme se, ale stránka, kterou hledáte, neexistuje nebo byla přesunuta. Pokud máte zájem, zkuste prozkoumat naši hlavní stránku.</p>
    <a href="/" class="btn">Zpět na hlavní stránku</a>
</body>
</html>
